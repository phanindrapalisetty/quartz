server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API routes to the backend (Docker internal DNS)
    location ~ ^/(auth|sheets|query|connectors|health) {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large file uploads (CSV/Excel)
        client_max_body_size 50M;
        proxy_read_timeout   120s;
    }

    # SPA fallback — all unknown routes served as index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip static assets
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript
                    image/svg+xml application/xml;

    # Cache static assets aggressively, no-cache HTML
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
