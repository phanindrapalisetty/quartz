version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/callback}
      STREAMLIT_URL: ${STREAMLIT_URL:-http://localhost:8501}

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_URL: http://backend:8000          # server-side Python → backend (Docker internal)
      PUBLIC_API_URL: http://localhost:8000  # browser links → backend (host port mapping)
    depends_on:
      - backend
