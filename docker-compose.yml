version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - ./backend:/app          # uvicorn --reload picks up Python changes instantly

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app         # Vite HMR picks up React changes instantly
      - /app/node_modules       # keep node_modules from the image, not the host
    depends_on:
      - backend
